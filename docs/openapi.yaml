# SSHCustom-Magisk REST + SSE API
#
# This file documents the only API surface the v2 daemon exposes. The legacy
# pre-v2 /api/{status,profiles,profile/*,control,config,health,logs/*}
# endpoints were removed in v2.0.0 and are not supported.
#
# All JSON responses are wrapped in an Envelope:
#   { "api_version": "v1", "ok": true, "data": ... }
#   { "api_version": "v1", "ok": false, "error": "message" }
#
# The daemon listens on 127.0.0.1:9190 by default (configurable via the
# api.host/api.port keys in /data/adb/sshcustom/config.json). CORS is wide
# open for the local WebUI; the API is bound to loopback so this is
# device-local.

openapi: 3.1.0
info:
  title: SSHCustom-Magisk Daemon API
  version: v1
  description: |
    Local control API for the SSHCustom Magisk/KernelSU module daemon.
    Used by the bundled WebUI (served from /) and by the companion
    Android app over the loopback interface.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  - url: http://127.0.0.1:9190
    description: Default daemon binding on the device

tags:
  - name: status
    description: Runtime state, health, diagnostics
  - name: events
    description: Server-Sent Events stream for live state updates
  - name: profiles
    description: SSH profile CRUD and selection
  - name: control
    description: Daemon lifecycle control
  - name: config
    description: Network/DNS/hotspot configuration
  - name: logs
    description: Log read and clear endpoints
  - name: autostart
    description: Boot autostart marker

paths:
  /api/v1/health:
    get:
      tags: [status]
      summary: Liveness probe
      description: Returns ok plus the build version. Cheap; used by the watchdog.
      responses:
        "200":
          description: Daemon is up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeHealth"

  /api/v1/status:
    get:
      tags: [status]
      summary: Full runtime + config snapshot
      description: |
        Returns a single payload with `runtime` (live State), `config`
        (current saved config summary), `capabilities` (feature flags),
        and `paths` (work_dir, config_path, profiles_path, run_dir,
        webroot). The WebUI uses this on initial load and as a polling
        fallback when SSE is unavailable.
      responses:
        "200":
          description: Status snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeStatus"

  /api/v1/events:
    get:
      tags: [events]
      summary: Server-Sent Events stream of state changes
      description: |
        Long-lived `text/event-stream` connection. The daemon sends:

        - One initial `event: status` with the same payload shape as
          `/api/v1/status` so consumers can render immediately.
        - One `event: status` every time `state.set` is called inside
          the daemon (route changes, pool reconnects, profile switches,
          metrics samples every 20 s, etc.). Notifications are
          coalesced — slow consumers may miss intermediate events but
          the next one is always a full fresh snapshot.
        - A `: ping` comment every 25 s so Android battery savers,
          buggy proxies, and idle TCP timeouts don't kill the stream.

        Clients should fall back to polling `/api/v1/status` if the
        EventSource fails to open or errors repeatedly. The daemon does
        not buffer events for disconnected clients.
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
                example: |
                  event: status
                  data: {"runtime":{...},"config":{...},"paths":{...}}

                  : ping

                  event: status
                  data: {"runtime":{...},"config":{...},"paths":{...}}
        "500":
          description: Streaming unsupported (HTTP server cannot flush)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"

  /api/v1/network/public-ip:
    get:
      tags: [status]
      summary: Lookup the tunnel-side public IP
      description: |
        Asks ip-api.com via the local SOCKS5 proxy. The device-side
        public-IP lookup was removed in v2 because Android's dnsproxyd
        is restricted to system uids and the Go HTTP client cannot
        resolve hostnames from a regular app uid; the WebUI now reads
        the local source IP directly from the runtime state instead.
        Cached for 60 seconds.
      parameters:
        - in: query
          name: refresh
          schema: { type: string, enum: ["1"] }
          description: If "1", bypass the 60s cache.
          required: false
      responses:
        "200":
          description: Public IP details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopePublicIP"

  /api/v1/diagnostics:
    get:
      tags: [status]
      summary: Detailed runtime + pool + perf snapshot
      responses:
        "200":
          description: Diagnostics payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeDiagnostics"

  /api/v1/config:
    get:
      tags: [config]
      summary: Read current daemon config
      responses:
        "200":
          description: Full config object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeAny"
    post:
      tags: [config]
      summary: Patch config (DNS / hotspot)
      description: |
        Accepts a partial patch of `dns` and/or `hotspot`. The daemon
        normalizes the result, persists it via atomic rename, and
        optionally schedules a restart so transport changes take
        effect. Returns the merged config plus a list of
        `changed` sections (e.g. ["dns","hotspot"]).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigPatchRequest"
      responses:
        "200":
          description: Merged config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeConfigUpdate"
        "400":
          description: Invalid patch (e.g. custom DNS with no IPs)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"
    patch:
      tags: [config]
      summary: Same as POST
      description: Identical semantics to POST; both are accepted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigPatchRequest"
      responses:
        "200":
          description: Merged config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeConfigUpdate"

  /api/v1/profiles:
    get:
      tags: [profiles]
      summary: List all profiles
      description: Returns the full ProfilesFile including selected_id.
      responses:
        "200":
          description: Profiles list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeProfilesFile"

  /api/v1/profile/current:
    get:
      tags: [profiles]
      summary: Get the currently selected profile
      responses:
        "200":
          description: Selected profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeProfile"
        "404":
          description: No profile selected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"

  /api/v1/profile/select:
    post:
      tags: [profiles]
      summary: Switch the selected profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                selected_id: { type: string }
                restart: { type: boolean, description: "If true, restart the daemon after selecting" }
              required: [selected_id]
      responses:
        "200":
          description: Selection accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeAny"

  /api/v1/profile/save:
    post:
      tags: [profiles]
      summary: Create or update a profile
      description: |
        If `id` is empty the daemon generates one from the slugified name.
        `password` may be empty when editing — the daemon preserves the
        existing stored value. Profile-side `fallback_ips` was removed in
        v2 from the save request shape; the daemon's smart resolver
        handles DNS failures, but pre-v2 stored fallback_ips on a profile
        are kept intact across saves.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveProfileRequest"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeAny"

  /api/v1/control:
    post:
      tags: [control]
      summary: Lifecycle control (start/stop/restart/clean)
      description: |
        Schedules the named action via the on-disk
        `/data/adb/sshcustom/sshcustom.sh` script. The HTTP response
        returns immediately; the actual action runs ~300 ms later in
        a backgrounded shell so the API can reply before the daemon
        is killed by `restart`/`stop`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum: [start, stop, restart, clean]
              required: [action]
      responses:
        "200":
          description: Scheduled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeAny"

  /api/v1/logs/{kind}:
    get:
      tags: [logs]
      summary: Tail of a log file
      description: |
        Returns up to the last 64 KiB of the named log as plain text.
        Larger files are truncated from the head. Suitable for the
        WebUI Logs tab; not paginated.
      parameters:
        - in: path
          name: kind
          required: true
          schema:
            type: string
            enum: [core, control, action]
      responses:
        "200":
          description: Log tail
          content:
            text/plain:
              schema: { type: string }

  /api/v1/logs/{kind}/clear:
    post:
      tags: [logs]
      summary: Truncate a log file on disk
      description: |
        Truncates the named log on disk via O_TRUNC. The daemon keeps
        writing new entries afterwards; an audit line is appended
        immediately. POST is required so accidental browser pre-fetch
        can't wipe logs.
      parameters:
        - in: path
          name: kind
          required: true
          schema:
            type: string
            enum: [core, control, action]
      responses:
        "200":
          description: Cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeAny"
        "405":
          description: GET not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeError"

  /api/v1/autostart:
    get:
      tags: [autostart]
      summary: Read the autostart marker state
      description: |
        The marker is `<run_dir>/autostart` (default
        `/data/adb/sshcustom/run/autostart`). Its presence is read by
        `service.sh` at boot to decide whether to wait for connectivity
        and call `sshcustom.sh start`.
      responses:
        "200":
          description: Current state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeEnabled"
    post:
      tags: [autostart]
      summary: Enable or disable autostart on boot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled: { type: boolean }
              required: [enabled]
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeEnabled"
    put:
      tags: [autostart]
      summary: Same as POST
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled: { type: boolean }
              required: [enabled]
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnvelopeEnabled"

components:
  schemas:
    Envelope:
      type: object
      properties:
        api_version: { type: string, example: "v1" }
        ok: { type: boolean }
        data: { description: "Endpoint-specific payload, present when ok=true" }
        error: { type: string, description: "Human-readable error message, present when ok=false" }
      required: [api_version, ok]

    EnvelopeError:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            ok: { type: boolean, enum: [false] }
            error: { type: string }

    EnvelopeAny:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data: { type: object, additionalProperties: true }

    EnvelopeHealth:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                status: { type: string, enum: [ok] }
                version: { type: string }

    EnvelopeStatus:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                runtime: { $ref: "#/components/schemas/RuntimeState" }
                config: { $ref: "#/components/schemas/ConfigSummary" }
                capabilities:
                  type: array
                  items: { $ref: "#/components/schemas/Capability" }
                paths: { $ref: "#/components/schemas/Paths" }

    EnvelopePublicIP:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                checked_at: { type: string, format: date-time }
                provider: { type: string, example: "ip-api.com" }
                tunnel: { $ref: "#/components/schemas/PublicIPDetails" }

    EnvelopeDiagnostics:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                runtime: { $ref: "#/components/schemas/RuntimeState" }
                config: { $ref: "#/components/schemas/ConfigSummary" }
                pool: { type: object, additionalProperties: true }
                route: { type: object, additionalProperties: true }
                performance: { type: object, additionalProperties: true }
                logs: { type: object, additionalProperties: true }

    EnvelopeProfile:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data: { $ref: "#/components/schemas/Profile" }

    EnvelopeProfilesFile:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                selected_id: { type: string }
                profiles:
                  type: array
                  items: { $ref: "#/components/schemas/Profile" }

    EnvelopeConfigUpdate:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                config: { type: object, additionalProperties: true }
                restart: { type: boolean }
                restart_pending: { type: boolean }
                changed:
                  type: array
                  items: { type: string }

    EnvelopeEnabled:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          properties:
            data:
              type: object
              properties:
                enabled: { type: boolean }

    Paths:
      type: object
      properties:
        work_dir: { type: string, example: "/data/adb/sshcustom" }
        config_path: { type: string }
        profiles_path: { type: string }
        run_dir: { type: string }
        webroot: { type: string }

    Capability:
      type: object
      properties:
        name: { type: string }
        enabled: { type: boolean }
        description: { type: string }

    RuntimeState:
      description: |
        Snapshot of the daemon's runtime state. Field names match the
        JSON keys produced by State.Snapshot in cmd/sshcustomd/main.go.
      type: object
      additionalProperties: true
      properties:
        started_at: { type: string, format: date-time }
        uptime_seconds: { type: integer }
        state: { type: string, example: "SSH_AUTHENTICATED_POOL" }
        running: { type: boolean }
        connected: { type: boolean }
        ssh_authenticated: { type: boolean }
        transport_ready: { type: boolean }
        version: { type: string }
        goos: { type: string }
        goarch: { type: string }
        selected_profile: { type: string }
        selected_mode: { type: string, enum: [direct, http_proxy, tls_sni, http_proxy_tls_sni] }
        transport_chain: { type: string, example: "tcp -> http_proxy -> payload -> ssh" }
        payload_enabled: { type: boolean }
        last_error: { type: string }
        last_event: { type: string }
        attempt: { type: integer }
        network_online: { type: boolean }
        interface: { type: string, example: "rmnet_data0" }
        gateway: { type: string }
        source_ip: { type: string, description: "Local interface address used by the route probe" }
        socks_running: { type: boolean }
        socks_addr: { type: string }
        transparent_running: { type: boolean }
        transparent_addr: { type: string }
        hotspot_running: { type: boolean }
        cpu_percent: { type: number }
        memory_rss_bytes: { type: integer }
        memory_rss_mb: { type: number }
        system_mem_used_percent: { type: number }
        pool_size: { type: integer }
        pool_healthy: { type: integer }
        pool_streams: { type: integer }
        pool_last_error: { type: string }
        dns_mode: { type: string, enum: [device, google, cloudflare, custom] }
        dns_servers:
          type: array
          items: { type: string }
        resolved_ips:
          type: array
          items: { type: string }

    ConfigSummary:
      type: object
      additionalProperties: true
      properties:
        dns:
          type: object
          properties:
            mode: { type: string, enum: [device, google, cloudflare, custom] }
            enabled: { type: boolean }
            servers: { type: array, items: { type: string } }
            timeout_seconds: { type: integer }
            hijack: { type: boolean }
        hotspot:
          type: object
          properties:
            enabled: { type: boolean }
            tcp: { type: boolean }
            dns: { type: boolean }
            interfaces: { type: array, items: { type: string } }
        local_proxy:
          type: object
          properties:
            socks_enabled: { type: boolean }
            socks_host: { type: string }
            socks_port: { type: integer }
        transparent_proxy:
          type: object
          properties:
            enabled: { type: boolean }
            tcp_port: { type: integer }
            chains_prefix: { type: string }
            ipv4_only: { type: boolean }

    ConfigPatchRequest:
      type: object
      properties:
        dns:
          type: object
          properties:
            mode: { type: string, enum: [device, google, cloudflare, custom] }
            servers: { type: array, items: { type: string } }
            timeout_seconds: { type: integer }
        hotspot:
          type: object
          properties:
            enabled: { type: boolean }
            tcp: { type: boolean }
            dns: { type: boolean }
            interfaces: { type: array, items: { type: string } }
        restart: { type: boolean, description: "If true, restart the daemon after applying" }

    PublicIPDetails:
      type: object
      properties:
        ok: { type: boolean }
        path: { type: string, enum: [tunnel] }
        ip: { type: string }
        country: { type: string }
        region: { type: string }
        city: { type: string }
        isp: { type: string }
        org: { type: string }
        asn: { type: string }
        as_name: { type: string }
        timezone: { type: string }
        latency_ms: { type: integer }
        cached: { type: boolean }
        error: { type: string }

    Profile:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        selected: { type: boolean }
        ssh: { $ref: "#/components/schemas/SSH" }
        transport: { $ref: "#/components/schemas/Transport" }

    SSH:
      type: object
      properties:
        host: { type: string }
        port: { type: integer }
        username: { type: string }
        password: { type: string }
        auth_type: { type: string, enum: [password] }
        fallback_ips:
          type: array
          items: { type: string }
          description: "Legacy field. v2 does not show or accept this from the editor; existing values are preserved."

    Transport:
      type: object
      properties:
        mode: { type: string, enum: [direct, http_proxy, tls_sni, http_proxy_tls_sni] }
        chain: { type: array, items: { type: string } }
        http_proxy:
          type: object
          properties:
            host: { type: string }
            port: { type: integer }
            connect_method: { type: string, enum: [socket, connect] }
        tls:
          type: object
          properties:
            enabled: { type: boolean }
            server_name: { type: string }
            insecure_skip_verify: { type: boolean }
            alpn: { type: array, items: { type: string } }
        payload:
          type: object
          properties:
            enabled: { type: boolean }
            template: { type: string }
            send_timing: { type: string, enum: [before_ssh, after_proxy_socket_before_ssh, after_tls_before_ssh] }
            read_response: { type: boolean }
            allow_http_status: { type: array, items: { type: integer } }

    SaveProfileRequest:
      type: object
      properties:
        id: { type: string, description: "Empty creates a new profile" }
        name: { type: string }
        select: { type: boolean, description: "If true, mark this profile selected after save" }
        restart: { type: boolean, description: "If true, restart the daemon after save" }
        ssh: { $ref: "#/components/schemas/SSH" }
        transport:
          type: object
          properties:
            mode: { type: string, enum: [direct, http_proxy, tls_sni, http_proxy_tls_sni] }
            http_proxy: { type: object, additionalProperties: true }
            tls: { type: object, additionalProperties: true }
            payload: { type: object, additionalProperties: true }
      required: [name, ssh, transport]
